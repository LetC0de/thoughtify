<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thought — FreeSpeak</title>
  <meta name="description" content="Read a thought on FreeSpeak." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="post.css" />
</head>
<body>

  <!-- ═══ Ambient Glows ═══ -->
  <div class="ambient-glow ambient-glow--top" aria-hidden="true"></div>
  <div class="ambient-glow ambient-glow--bottom" aria-hidden="true"></div>

  <!-- ═══ Loading Overlay ═══ -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-logo">✦</div>
      <div class="loading-spinner"></div>
      <p class="loading-text">FreeSpeak</p>
    </div>
  </div>

  <!-- ═══ POST DETAIL PAGE ═══ -->
  <div class="post-page" id="postPage">

    <!-- ── Nav Bar ── -->
    <nav class="post-nav">
      <div class="post-nav-inner">
        <div class="post-nav-left">
          <button class="post-nav-back" id="backBtn" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></polyline></svg>
            <span>Back</span>
          </button>
        </div>
        <a href="/" class="post-nav-logo" aria-label="FreeSpeak home">
          <span class="logo-icon" aria-hidden="true">✦</span>
          <span class="logo-text">Free<span>Speak</span></span>
        </a>
        <div class="post-nav-right"></div>
      </div>
    </nav>

    <!-- ── Main Content ── -->
    <main class="post-main">

      <!-- Error state -->
      <div class="post-error" id="postError">
        <div class="post-error-icon">⟡</div>
        <h2 class="post-error-title">This page is gone</h2>
        <p class="post-error-text">The thought you're looking for doesn't exist or was removed.</p>
        <a href="/" class="post-error-btn">← Back to Feed</a>
      </div>

      <!-- Skeleton -->
      <div class="post-skeleton" id="postSkeleton">
        <div class="post-skel-block">
          <div class="post-skel-avatar"></div>
          <div class="post-skel-meta">
            <div class="post-skel-line" style="width:140px; height:14px;"></div>
            <div class="post-skel-line" style="width:90px; height:12px; margin-top:6px;"></div>
          </div>
        </div>
        <div class="post-skel-line" style="width:110px; height:14px; margin-top:10px;"></div>
        <div class="post-skel-line" style="width:85%; height:34px; margin-top:28px;"></div>
        <div class="post-skel-line" style="width:100%; height:16px; margin-top:20px;"></div>
        <div class="post-skel-line" style="width:100%; height:16px;"></div>
        <div class="post-skel-line" style="width:100%; height:16px;"></div>
        <div class="post-skel-line" style="width:72%; height:16px;"></div>
        <div class="post-skel-line" style="width:100%; height:16px; margin-top:14px;"></div>
        <div class="post-skel-line" style="width:55%; height:16px;"></div>
      </div>

      <!-- Post article -->
      <article class="post-article" id="postArticle" style="display: none;">

        <!-- Author row -->
        <div class="post-author" id="postAuthor">
          <div class="post-author-avatar-wrap">
            <div class="post-author-avatar" id="postAuthorAvatar">?</div>
          </div>
          <div class="post-author-info">
            <a href="#" class="post-author-name" id="postAuthorName">Unknown</a>
            <div class="post-author-meta">
              <span class="post-author-username" id="postAuthorUsername">@unknown</span>
              <span class="post-meta-dot">·</span>
              <span class="post-date" id="postDate">just now</span>
              <span class="post-meta-dot">·</span>
              <span class="post-reading-time" id="postReadingTime">1 min read</span>
            </div>
          </div>
          <div class="post-author-actions" id="postOwnerActions" style="display: none;">
            <button class="post-icon-btn" id="postEditBtn" title="Edit" aria-label="Edit">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="post-icon-btn post-icon-btn--danger" id="postDeleteBtn" title="Delete" aria-label="Delete">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>

        <!-- Title -->
        <h1 class="post-title" id="postTitle"></h1>

        <!-- Content -->
        <div class="post-content" id="postContent"></div>

        <!-- Tags / meta footer -->
        <div class="post-footer-meta">
          <div class="post-tags" id="postTags"></div>
        </div>

        <!-- Action bar -->
        <div class="post-actions-bar" id="postActions">
          <button class="post-action-btn post-action-btn--like" id="postLikeBtn" aria-label="Like">
            <svg class="post-like-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="post-action-count" id="postLikeCount">0</span>
          </button>
          <button class="post-action-btn" id="postCommentBtn" aria-label="Comment">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="post-action-count" id="postCommentCount">0</span>
          </button>
          <button class="post-action-btn" id="postShareBtn" aria-label="Share">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </div>

      </article>

      <!-- ═══ Comments Section ═══ -->
      <section class="post-comments" id="postCommentsSection">
        <div class="post-comments-header">
          <h3 class="post-comments-title">Comments</h3>
          <span class="post-comments-count" id="postCommentsCount">0</span>
        </div>

        <!-- Comment form -->
        <div class="post-comment-form" id="postCommentForm">
          <div class="post-comment-avatar" id="commentFormAvatar">?</div>
          <div class="post-comment-input-wrap">
            <textarea class="post-comment-input" id="postCommentInput" placeholder="Write a comment..." rows="2"></textarea>
            <div class="post-comment-actions">
              <span class="post-comment-replying" id="postReplyingTo" style="display: none;">
                Replying to <strong id="postReplyTargetName"></strong>
                <button class="post-comment-cancel" id="postCancelReply">Cancel</button>
              </span>
              <button class="btn btn-primary btn-sm" id="postCommentSubmit">Post</button>
            </div>
          </div>
        </div>

        <!-- Comments list -->
        <div class="post-comments-list" id="postCommentsList">
          <div class="post-comments-empty" id="postCommentsEmpty">
            <p>No comments yet. Be the first to share your thoughts!</p>
          </div>
        </div>
      </section>

      <!-- Related / More section -->
      <div class="post-more" id="postMore" style="display: none;">
        <div class="post-more-divider">
          <span class="post-more-line"></span>
          <span class="post-more-ornament">◈</span>
          <span class="post-more-line"></span>
        </div>
        <p class="post-more-text">More thoughts coming soon</p>
      </div>

    </main>
  </div>

  <!-- ═══ Toast Container ═══ -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="post.js"></script>
</body>
</html>
